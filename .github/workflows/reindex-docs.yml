name: Reindex docs search

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

jobs:
  reindex:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Algolia Crawler reindex
        env:
          CRAWLER_ID: ${{ secrets.ALGOLIA_CRAWLER_ID }}
          CRAWLER_USER_ID: ${{ secrets.ALGOLIA_CRAWLER_USER_ID }}
          CRAWLER_API_KEY: ${{ secrets.ALGOLIA_CRAWLER_API_KEY }}
        run: |
          status=$(curl -sS -o /tmp/reindex-response.json -w '%{http_code}' \
            -X POST \
            -u "$CRAWLER_USER_ID:$CRAWLER_API_KEY" \
            "https://crawler.algolia.com/api/1/crawlers/$CRAWLER_ID/reindex")

          echo "Crawler responded with HTTP $status"
          cat /tmp/reindex-response.json

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Algolia reindex request failed (HTTP $status)"
            exit 1
          fi
